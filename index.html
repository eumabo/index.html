<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist Veicular</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --primary:#1f4f45;
  --accent:#2f7d6d;
  --bg:#e9f1ef;
}

body {
  margin:0;
  background-color: #1f4d45;
  font-family:Segoe UI, Arial;
}

.wrapper {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.app {
  background-color: #eef5f3;
  min-height: 100vh;
  padding-bottom: 40px;
}


.header {
  background:var(--primary);
  color:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.layout {
  display:grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap:20px;
}

@media(max-width:900px){
  .layout {
    grid-template-columns:1fr;
  }
}

.container {
  background:#fff;
  padding:25px;
  border-radius:12px;
}

.image-box {
  background:#fff;
  border-radius:12px;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.image-box img {
  width:100%;
  border-radius:10px;
  object-fit:cover;
}

h2 {
  color:var(--primary);
  margin-top:0;
}

.section {
  margin-bottom:25px;
}

.field {
  margin-bottom:12px;
}

label {
  font-size:14px;
  font-weight:600;
}

input, select, textarea {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:4px;
}

textarea {
  min-height:80px;
}

.check-item {
  display:grid;
  grid-template-columns:20px 1fr 60px 140px;
  gap:8px;
  align-items:center;
  padding:8px;
  border-radius:8px;
  background:#f4f7f6;
  margin-bottom:8px;
}

button {
  padding:14px;
  width:100%;
  border:none;
  border-radius:8px;
  font-size:16px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:var(--accent);
}

.secondary-btn {
  background:#777;
  margin-top:10px;
}

canvas {
  border:1px dashed #ccc;
  width:100%;
  height:150px;
  border-radius:8px;
}

footer {
  font-size:12px;
  color:#777;
  margin-top:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="header">
  <div class="header-content">
    <img src="img/logo-check.png" height=" 100px" alt="Logo da Empresa" class="logo">
    <div>
      <h1>Checklist Digital de Veículos</h1>
      <p>Controle interno • Registro digital</p>
    </div>
  </div>
</div>


  <div class="layout">

    <!-- FORMULÁRIO -->
    <div class="container">

      <div class="section">
        <h2>Dados do Veículo</h2>

        <div class="field"><label>Motorista</label><input id="motorista"></div>
        <div class="field"><label>Placa Cavalo</label><input id="placaCavalo"></div>
        <div class="field"><label>Placa Carreta</label><input id="placaCarreta"></div>

        <div class="field">
          <label>Tipo</label>
          <select id="tipo">
            <option>Sider Vanderleia</option>
            <option>Sider LS</option>
            <option>Baú</option>
            <option>Graneleiro</option>
          </select>
        </div>

        <div class="field">
          <label>Operação</label>
          <select id="operacao">
            <option>Entrada</option>
            <option>Saída</option>
          </select>
        </div>
      </div>

      <div class="section">
        <h2>Itens Obrigatórios</h2>
        <div id="checklist"></div>
      </div>

      <div class="section">
        <h2>Observações</h2>
        <textarea id="observacoes"></textarea>
      </div>

      <div class="section">
        <h2>Assinatura do Motorista</h2>
        <canvas id="assinatura"></canvas>
        <button class="secondary-btn" type="button" onclick="limparAssinatura()">Limpar Assinatura</button>
      </div>

      <button onclick="gerarPDFeEnviar()">Gerar PDF e Enviar</button>

      <footer>
        Checklist Digital Veicular • Uso interno
      </footer>

    </div>
  </div>
</div>

<script>
emailjs.init("EBdPTk7rvm3liHux5");

const itens = [
"Kit moop","Conjunto de chaves","Documentação",
"Bobina ou disco tacógrafo","Cones",
"Kit jogo chave de roda","Extintor de segurança",
"Trava do sider/baú","Filtros diesel/racor",
"Farol/ lanternas","Lavagem/ lubrificação",
"Freios","Calibragem de pneus",
"Faixas refletivas laterais e traseira",
"Macaco 12 toneladas","Lacre do sider (cabo de aço)",
"Calços","Cintas (bobina)","Catracas (bobina)",
"Aranhas (bobina)","Cintas","Catracas móvel",
"Cantoneiras","Réguas do sider","Catracas fixas",
"Sider/ baú em boas condições","Pneu estepe",
"Cabo de estepe","Cadeado 50mm","Cadeado 35mm",
"Madeirite (24 und)"
];

const checklist = document.getElementById("checklist");

itens.forEach(item=>{
  checklist.innerHTML += `
  <div class="check-item">
    <input type="checkbox">
    <span>${item}</span>
    <input type="text" placeholder="QTD">
    <input type="file">
  </div>`;
});

// Assinatura
  const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");
let desenhando = false;

canvas.onmousedown = e => { desenhando=true; ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY); };
canvas.onmousemove = e => { if(desenhando){ ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke(); }};
canvas.onmouseup = ()=> desenhando=false;
canvas.onmouseleave = ()=> desenhando=false;

function limparAssinatura(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

async function gerarPDFeEnviar(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let texto = `
Motorista: ${motorista.value}
Placa Cavalo: ${placaCavalo.value}
Placa Carreta: ${placaCarreta.value}
Tipo: ${tipo.value}
Operação: ${operacao.value}

Checklist:
`;

  document.querySelectorAll(".check-item").forEach(i=>{
    if(i.querySelector("input[type=checkbox]").checked){
      texto += "✔ " + i.querySelector("span").innerText + "\n";
    }
  });

  pdf.text(texto,10,10);
  pdf.addImage(canvas.toDataURL(), "PNG", 10, 200, 180, 40);

  const pdfBase64 = pdf.output("datauristring");

  emailjs.send(
    "service_edz1e3f",
    "template_5f0bk2p",
    {
      motorista: motorista.value,
      placa_cavalo: placaCavalo.value,
      placa_carreta: placaCarreta.value,  
      tipo: tipo.value,
      operacao: operacao.value,
      observacoes: observacoes.value,
      pdf: pdfBase64
    }
  ).then(()=>{
    alert("Checklist enviado com sucesso!");
  }).catch(e=>{
    alert("Erro ao enviar");
    console.error(e);
  });
}
</script>

</body>
</html>
